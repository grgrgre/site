server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 512m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location ~ /\. {
        deny all;
    }

    location = /api/config.php { deny all; }
    location = /api/database.php { deny all; }

    location ~ ^/storage/backups/ {
        deny all;
    }

    location ~ ^/storage/data/ {
        deny all;
    }

    location ~ ^/[^/]+\.(zip|tar|gz|tgz|7z|bak|old|sql|sqlite|db)$ {
        deny all;
    }

    location ^~ /svh-ctrl-x7k9/ {
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri $uri/ /router.php?$query_string;
    }

    location ~* \.(css|js|mjs|map)$ {
        expires -1;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.(?:jpg|jpeg|gif|png|webp|avif|svg|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html /router.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_pass php:9000;
        fastcgi_read_timeout 180s;
    }
}
